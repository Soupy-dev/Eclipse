name: Build and Release
on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
jobs:
  build-ios:
    name: Build iOS IPA
    runs-on: macos-26
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Make build script executable
        run: chmod +x ./ipabuild.sh
      - name: Build iOS IPA
        run: ./ipabuild.sh ios
      - name: Upload iOS IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Luna-iOS
          path: build/Luna.ipa

  build-tvos:
    name: Build tvOS IPA
    runs-on: macos-26
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Make build script executable
        run: chmod +x ./ipabuild.sh
      - name: Build tvOS IPA
        run: ./ipabuild.sh tvos
      - name: Upload tvOS IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Luna-tvOS
          path: build/Luna-tvOS.ipa

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-ios, build-tvos]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download iOS IPA
        uses: actions/download-artifact@v4
        with:
          name: Luna-iOS
          path: release-assets

      - name: Download tvOS IPA
        uses: actions/download-artifact@v4
        with:
          name: Luna-tvOS
          path: release-assets

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/Luna.ipa
            release-assets/Luna-tvOS.ipa
          generate_release_notes: true
